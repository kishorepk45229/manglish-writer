<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thooval | Modern Manglish Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        :root {
            /* Lemon Green Theme */
            --accent-color: #a3e635; 
            --accent-hover: #84cc16;
            --accent-light: #ecfccb; 
            --text-on-accent: #1a2e05; 
            
            --bg-main: #ffffff;
            --bg-sidebar: #fafafa;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background-color: var(--accent-color);
            color: var(--text-on-accent);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(163, 230, 53, 0.4);
        }

        .new-file-btn {
            background-color: var(--accent-color);
            color: var(--text-on-accent);
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .new-file-btn:hover { background-color: var(--accent-hover); }

        .file-list {
            flex-grow: 1;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .file-item {
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .file-item.active {
            background-color: var(--accent-light);
            color: var(--text-on-accent);
            border-color: var(--accent-color);
        }

        /* User Profile */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: var(--text-on-accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-details { display: flex; flex-direction: column; }
        .user-name { font-weight: 600; font-size: 0.85rem; }
        .user-role { font-size: 0.75rem; color: var(--text-secondary); }


        /* --- MAIN WORKSPACE --- */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 15px;
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn:hover, .tool-btn.active { 
            background-color: var(--accent-light); 
            color: var(--text-on-accent); 
        }
        
        .divider { width: 1px; height: 24px; background-color: var(--border-color); }

        .select-format {
            border: 1px solid transparent;
            font-family: 'Inter', sans-serif;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .select-format:hover { background-color: var(--bg-sidebar); }

        /* Suggestion Dictionary Bar */
        .suggestion-bar {
            padding: 12px 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            min-height: 56px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }
        
        .suggestion-placeholder { color: var(--text-secondary); font-size: 0.9rem; font-style: italic; }
        
        .suggestion-item {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Manjari', sans-serif;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .suggestion-item.active, .suggestion-item:hover {
            background: var(--accent-color);
            color: var(--text-on-accent);
            border-color: var(--accent-color);
        }

        /* Text Area */
        #editor {
            flex-grow: 1;
            width: 100%;
            padding: 30px;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Manjari', sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-primary);
            transition: font-weight 0.2s, font-style 0.2s, text-decoration 0.2s;
        }

        /* Bottom Status Bar */
        .status-bar {
            height: 60px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background-color: var(--bg-main);
        }

        .status-group { display: flex; gap: 10px; align-items: center; }

        .action-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .action-btn:hover { background-color: var(--bg-sidebar); border-color: var(--accent-color); }
        
        .btn-dtp { background-color: var(--accent-light); color: var(--text-on-accent); border-color: var(--accent-color); }
        .btn-dtp:hover { background-color: var(--accent-color); }

        .lang-toggle {
            display: flex;
            background: var(--bg-sidebar);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .lang-btn {
            padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 0.9rem;
        }
        .lang-btn.active { background: var(--accent-color); color: var(--text-on-accent); font-weight: 600; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">അ</div>
            Thooval
        </div>

        <button class="new-file-btn">
            <span>➕</span> New File
        </button>

        <div class="file-list">
            <div class="list-header">Today</div>
            <div class="file-item active">
                <span>📄</span> Draft_01.txt
            </div>
            <div class="file-item">
                <span>📄</span> Chapter_2_Notes
            </div>
        </div>

        <div class="user-profile">
            <div class="avatar">KK</div>
            <div class="user-details">
                <span class="user-name">Kishore Krishnan</span>
                <span class="user-role">Workspace User</span>
            </div>
        </div>
    </aside>

    <main class="workspace">
        
        <div class="toolbar">
            <button class="tool-btn" id="btn-undo" title="Undo">&#x21BA;</button>
            <button class="tool-btn" id="btn-redo" title="Redo">&#x21BB;</button>
            
            <div class="divider"></div>
            
            <select class="select-format" id="font-family-select">
                <option value="'Manjari', sans-serif">Manjari</option>
                <option value="'Chilanka', cursive">Chilanka</option>
                <option value="'Gayathri', sans-serif">Gayathri</option>
            </select>
            
            <select class="select-format" id="font-size-select">
                <option value="16">16px</option>
                <option value="18" selected>18px</option>
                <option value="22">22px</option>
                <option value="26">26px</option>
            </select>
            
            <div class="divider"></div>
            
            <button class="tool-btn" id="btn-bold" title="Bold"><b>B</b></button>
            <button class="tool-btn" id="btn-italic" title="Italic"><i>I</i></button>
            <button class="tool-btn" id="btn-underline" title="Underline"><u>U</u></button>
        </div>

        <div class="suggestion-bar" id="suggestion-bar">
            <span class="suggestion-placeholder">Type in English (e.g., 'namaskaram')...</span>
        </div>

        <textarea id="editor" placeholder="ഇവിടെ മലയാളം എഴുതാം..."></textarea>

        <div class="status-bar">
            <div class="status-group">
                <div class="lang-toggle">
                    <button class="lang-btn active">മലയാളം</button>
                    <button class="lang-btn">English</button>
                </div>
                <button class="action-btn">🎤 Voice Typing</button>
            </div>
            
            <div class="status-group">
                <button class="action-btn" id="btn-copy-uni">📋 Copy Unicode</button>
                <button class="action-btn btn-dtp" id="btn-copy-fml">📄 Copy FML-TT</button>
            </div>
        </div>

    </main>

    <script>
        $(document).ready(function() {
            const $editor = $('#editor');
            const $suggestionBar = $('#suggestion-bar');
            let currentMatchStart = -1;
            let currentMatchEnd = -1;

            // --- 1. Custom History for Undo/Redo ---
            let textHistory = [""];
            let historyIndex = 0;

            function saveHistory() {
                let currentVal = $editor.val();
                if (currentVal !== textHistory[historyIndex]) {
                    textHistory = textHistory.slice(0, historyIndex + 1);
                    textHistory.push(currentVal);
                    historyIndex++;
                }
            }

            $('#btn-undo').on('click', function() {
                if (historyIndex > 0) {
                    historyIndex--;
                    $editor.val(textHistory[historyIndex]);
                }
            });

            $('#btn-redo').on('click', function() {
                if (historyIndex < textHistory.length - 1) {
                    historyIndex++;
                    $editor.val(textHistory[historyIndex]);
                }
            });

            // --- 2. Toolbar Formatting Logic ---
            $('#font-family-select').on('change', function() { $editor.css('font-family', $(this).val()); });
            $('#font-size-select').on('change', function() { $editor.css('font-size', $(this).val() + 'px'); });
            
            $('#btn-bold').on('click', function() { 
                $(this).toggleClass('active'); 
                $editor.css('font-weight', $(this).hasClass('active') ? 'bold' : 'normal'); 
            });
            $('#btn-italic').on('click', function() { 
                $(this).toggleClass('active'); 
                $editor.css('font-style', $(this).hasClass('active') ? 'italic' : 'normal'); 
            });
            $('#btn-underline').on('click', function() { 
                $(this).toggleClass('active'); 
                $editor.css('text-decoration', $(this).hasClass('active') ? 'underline' : 'none'); 
            });

            // --- 3. Real-time Typing & Dictionary ---
            $editor.on('input', function() {
                let text = $editor.val();
                let cursorPos = $editor[0].selectionStart;
                let textBeforeCursor = text.substring(0, cursorPos);
                let match = textBeforeCursor.match(/([a-zA-Z]+)$/);

                if (match) {
                    currentMatchStart = match.index;
                    currentMatchEnd = cursorPos;
                    fetchSuggestions(match[1]);
                } else {
                    clearSuggestions();
                }
            });

            let typingTimer;
            $editor.on('keyup', function() {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(saveHistory, 1000); 
            });

            $editor.on('keydown', function(e) {
                let $active = $('.suggestion-item.active');
                if ($('.suggestion-item').length > 0) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        if ($active.length) $active.click(); 
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        let $next = $active.next('.suggestion-item');
                        if ($next.length) { $active.removeClass('active'); $next.addClass('active'); }
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        let $prev = $active.prev('.suggestion-item');
                        if ($prev.length) { $active.removeClass('active'); $prev.addClass('active'); }
                    }
                }
            });

            function fetchSuggestions(word) {
                $.get(`https://inputtools.google.com/request?text=${word}&itc=ml-t-i0-und&num=5&cp=0&cs=1&ie=utf-8&oe=utf-8`, function(res) {
                    if (res[0] === 'SUCCESS') renderSuggestions(res[1][0][1]);
                });
            }

            function renderSuggestions(words) {
                $suggestionBar.empty();
                words.forEach((word, index) => {
                    let activeClass = index === 0 ? 'active' : '';
                    let $badge = $(`<span class="suggestion-item ${activeClass}">${word}</span>`);
                    $badge.on('click', function() { replaceWord(word); });
                    $suggestionBar.append($badge);
                });
            }

            function replaceWord(malayalamWord) {
                let text = $editor.val();
                let before = text.substring(0, currentMatchStart);
                let after = text.substring(currentMatchEnd);
                $editor.val(before + malayalamWord + " " + after);
                let newPos = currentMatchStart + malayalamWord.length + 1;
                $editor[0].setSelectionRange(newPos, newPos);
                clearSuggestions();
                saveHistory();
                $editor.focus();
            }

            function clearSuggestions() {
                $suggestionBar.html('<span class="suggestion-placeholder">Type in English (e.g., \'namaskaram\')...</span>');
            }

            // --- 4. The Corrected FML-TT Conversion Engine ---
            $('#btn-copy-fml').on('click', function() {
                let text = $editor.val();
                
                // STAGE 1: Safely split compound vowels into left and right components
                text = text.replace(/ൊ/g, "ൊ"); 
                text = text.replace(/ോ/g, "ോ"); 
                text = text.replace(/ൌ/g, "ൌ"); 

                // STAGE 2: The Core Bug Fix! 
                // Only move 'െ', 'േ', and 'ൈ' BEFORE the consonant. 
                // DO NOT move 'ി' or 'ീ' because FML fonts require them to stay on the right.
                const consGroup = "([ക-ഹളഴറൺ-ൿ](?:്[ക-ഹളഴറൺ-ൿ])*)"; 
                const leftVowels = "([െേൈ])"; // Notice: ി and ീ are no longer here!
                const regexMove = new RegExp(consGroup + leftVowels, "g");
                text = text.replace(regexMove, "$2$1");

                // STAGE 3: Map to FML / Karthika Layout Characters
                const fmlMap = {
                    // Left Vowels (Moved by Regex)
                    'െ': 's', 'േ': 't', 'ൈ': 'S',
                    // Right Vowels & Modifiers (Stay in place)
                    'ി': 'n', 'ീ': 'o', 'ു': 'p', 'ൂ': 'q', 'ൃ': 'r', 'ാ': 'm', 'ൗ': 'w',
                    // Chillus
                    'ർ': 'À', 'ൽ': 'Â', 'ൾ': 'Ä', 'ൺ': 'Æ', 'ൻ': '³',
                    // Base Consonants
                    'ക': 'I', 'ഖ': 'J', 'ഗ': 'K', 'ഘ': 'L', 'ങ': 'M',
                    'ച': 'N', 'ഛ': 'O', 'ജ': 'P', 'ഝ': 'Q', 'ഞ': 'R',
                    'ട': 'S', 'ഠ': 'T', 'ഡ': 'U', 'ഢ': 'V', 'ണ': 'W',
                    'ത': 'X', 'ഥ': 'Y', 'ദ': 'Z', 'ധ': 'a', 'ന': 'b',
                    'പ': 'c', 'ഫ': 'd', 'ബ': 'e', 'ഭ': 'f', 'മ': 'g',
                    'യ': 'h', 'ര': 'i', 'ല': 'j', 'വ': 'k', 'ശ': 'l',
                    'ഷ': 'µ', 'സ': 'n', 'ഹ': 'o', 'ള': 'p', 'ഴ': 'q', 'റ': 'r',
                    // Vowels
                    'അ': 'A', 'ആ': 'B', 'ഇ': 'C', 'ഈ': 'D', 'ഉ': 'E',
                    // Virama
                    '്': 'v'
                };

                let fmlOutput = "";
                for (let i = 0; i < text.length; i++) {
                    fmlOutput += fmlMap[text[i]] || text[i];
                }

                navigator.clipboard.writeText(fmlOutput);
                let $btn = $(this);
                $btn.html('✅ Copied FML');
                setTimeout(() => $btn.html('📄 Copy FML-TT'), 2000);
            });

            // Standard Copy
            $('#btn-copy-uni').on('click', function() {
                navigator.clipboard.writeText($editor.val());
                let $btn = $(this);
                $btn.html('✅ Copied!');
                setTimeout(() => $btn.html('📋 Copy Unicode'), 2000);
            });
        });
    </script>
</body>
</html>
