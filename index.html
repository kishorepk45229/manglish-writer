<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Manglish Writer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <div class="brand">
                <h1>എഴുത്ത് <span>Canvas</span></h1>
            </div>
            <div class="main-actions">
                <button id="btn-copy-unicode" class="action-btn">📋 Copy Unicode</button>
                <button id="btn-copy-fml" class="action-btn dtp-btn">📋 FML-TT</button>
                <button id="btn-copy-ml" class="action-btn dtp-btn">📋 ML-TT</button>
                <button id="btn-theme" class="icon-btn" title="Toggle Dark Mode">🌙</button>
            </div>
        </header>

        <section class="editor-wrapper">
            <div class="suggestion-bar" id="suggestion-bar">
                <span class="suggestion-placeholder">Type English words here (e.g., 'namaskaram')...</span>
            </div>

            <textarea id="editor" placeholder="ഇവിടെ മലയാളം എഴുതാം..."></textarea>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
