<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thooval | Modern Manglish Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="light-theme">

    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <i class="ph-fill ph-feather"></i>
                <h2>Thooval</h2>
            </div>
            
            <nav class="file-nav">
                <button class="nav-btn active"><i class="ph ph-file-text"></i> Current Draft</button>
                <button class="nav-btn"><i class="ph ph-plus-circle"></i> New File</button>
                <button class="nav-btn"><i class="ph ph-folder-open"></i> All Files</button>
            </nav>

            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Kishore+Krishnan&background=0D8ABC&color=fff&rounded=true" alt="Profile" class="avatar">
                <div class="user-info">
                    <span class="user-name">Kishore Krishnan</span>
                    <span class="user-role">Workspace</span>
                </div>
            </div>
        </aside>

        <main class="workspace">
            <header class="top-header">
                <div class="formatting-toolbar">
                    <button class="format-btn" data-command="bold" title="Bold"><i class="ph ph-text-b"></i></button>
                    <button class="format-btn" data-command="italic" title="Italic"><i class="ph ph-text-italic"></i></button>
                    <button class="format-btn" data-command="underline" title="Underline"><i class="ph ph-text-underline"></i></button>
                    <div class="divider"></div>
                    <select id="font-selector" class="format-select">
                        <option value="Manjari">Manjari</option>
                        <option value="Chilanka">Chilanka</option>
                        <option value="Gayathri">Gayathri</option>
                    </select>
                </div>
                
                <div class="export-actions">
                    <button id="btn-copy-unicode" class="action-btn">Copy Unicode</button>
                    <button id="btn-copy-fml" class="action-btn dtp-btn">Copy FML-TT</button>
                    <button id="btn-theme" class="icon-btn"><i class="ph ph-moon"></i></button>
                </div>
            </header>

            <div class="editor-container">
                <div class="suggestion-bar" id="suggestion-bar">
                    <span class="suggestion-placeholder">Type English words here...</span>
                </div>

                <div id="editor" contenteditable="true" placeholder="Start drafting your story..."></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
