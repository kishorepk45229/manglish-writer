<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thooval | Modern Manglish Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        :root {
            --accent-color: #a3e635; 
            --accent-hover: #84cc16;
            --accent-light: #ecfccb; 
            --text-on-accent: #1a2e05; 
            
            --bg-main: #ffffff;
            --bg-sidebar: #fafafa;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            flex-shrink: 0;
            transition: left 0.3s ease;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background-color: var(--accent-color);
            color: var(--text-on-accent);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(163, 230, 53, 0.4);
        }

        .new-file-btn {
            background-color: var(--accent-color);
            color: var(--text-on-accent);
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .new-file-btn:hover { background-color: var(--accent-hover); }

        .file-list {
            flex-grow: 1;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .file-item {
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .file-item.active {
            background-color: var(--accent-light);
            color: var(--text-on-accent);
            border-color: var(--accent-color);
        }

        /* --- DICTIONARY SECTION --- */
        .dictionary-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dict-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dict-input {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            outline: none;
            font-size: 0.9rem;
            background: var(--bg-main);
            color: var(--text-primary);
        }

        .dict-input:focus {
            border-color: var(--accent-color);
        }

        .dict-results {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 120px;
            overflow-y: auto;
        }

        .dict-item {
            padding: 8px 10px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            font-family: 'Manjari', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            transition: 0.2s;
        }

        .dict-item:hover {
            background: var(--accent-color);
            color: var(--text-on-accent);
            border-color: var(--accent-color);
        }

        /* User Profile */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: var(--text-on-accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-details { display: flex; flex-direction: column; }
        .user-name { font-weight: 600; font-size: 0.85rem; }
        .user-role { font-size: 0.75rem; color: var(--text-secondary); }

        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 999;
        }

        /* --- MAIN WORKSPACE --- */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            height: 100vh;
            position: relative;
            width: calc(100% - 260px);
        }

        /* Toolbar */
        .toolbar {
            min-height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 10px 30px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .menu-toggle {
            display: none; background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: var(--text-primary);
        }

        .tool-btn {
            background: none; border: none; color: var(--text-secondary);
            font-size: 1.1rem; cursor: pointer; padding: 6px 10px; border-radius: 4px;
        }
        .tool-btn:hover, .tool-btn.active { background-color: var(--accent-light); color: var(--text-on-accent); }
        .divider { width: 1px; height: 24px; background-color: var(--border-color); }

        .select-format {
            border: 1px solid transparent; font-family: 'Inter', sans-serif;
            padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);
        }
        .select-format:hover { background-color: var(--bg-sidebar); }

        .keyboard-toggle {
            display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 500;
            color: var(--text-secondary); background: var(--bg-sidebar); padding: 6px 12px;
            border-radius: 20px; border: 1px solid var(--border-color);
        }
        .keyboard-toggle label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .keyboard-toggle input { accent-color: var(--accent-color); cursor: pointer; }

        /* Suggestion Bar */
        .suggestion-bar {
            padding: 12px 30px; display: flex; gap: 10px; align-items: center;
            min-height: 56px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color);
            overflow-x: auto; white-space: nowrap;
        }
        .suggestion-placeholder { color: var(--text-secondary); font-size: 0.9rem; font-style: italic; }
        
        .suggestion-item {
            background: var(--bg-main); border: 1px solid var(--border-color); padding: 6px 16px;
            border-radius: 20px; cursor: pointer; font-family: 'Manjari', sans-serif;
            font-size: 1.1rem; transition: 0.2s; display: inline-block;
        }
        .suggestion-item.active, .suggestion-item:hover {
            background: var(--accent-color); color: var(--text-on-accent); border-color: var(--accent-color);
        }

        /* Text Area */
        #editor {
            flex-grow: 1; width: 100%; padding: 30px; border: none; resize: none; outline: none;
            font-family: 'Manjari', sans-serif; font-size: 18px; line-height: 1.8; color: var(--text-primary);
        }

        /* Bottom Status Bar */
        .status-bar {
            min-height: 60px; border-top: 1px solid var(--border-color); display: flex;
            align-items: center; justify-content: space-between; padding: 10px 30px;
            background-color: var(--bg-main); flex-wrap: wrap; gap: 10px;
        }

        .status-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .action-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-color);
            background: var(--bg-main); font-weight: 500; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: 0.2s; white-space: nowrap;
        }
        .action-btn:hover { background-color: var(--bg-sidebar); border-color: var(--accent-color); }
        .action-btn.recording { background-color: #fee2e2; border-color: #ef4444; color: #b91c1c; animation: pulse 1.5s infinite; }
        
        .btn-dtp { background-color: var(--accent-light); color: var(--text-on-accent); border-color: var(--accent-color); }
        .btn-dtp:hover { background-color: var(--accent-color); }

        .lang-toggle {
            display: flex; background: var(--bg-sidebar); border-radius: 20px; border: 1px solid var(--border-color); overflow: hidden;
        }
        .lang-btn { padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 0.9rem; }
        .lang-btn.active { background: var(--accent-color); color: var(--text-on-accent); font-weight: 600; }

        /* --- MODAL POPUP --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: var(--bg-main); padding: 25px; border-radius: 12px;
            width: 90%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.1rem; }
        .close-modal { cursor: pointer; font-size: 1.5rem; color: var(--text-secondary); border: none; background: none; }
        #fml-output-area {
            width: 100%; height: 150px; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color); font-size: 1.2rem; resize: none; outline: none;
        }
        .modal-btn {
            background: var(--accent-color); color: var(--text-on-accent);
            border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; top: 0; }
            .sidebar.open { left: 0; }
            .sidebar-overlay.open { display: block; }
            .workspace { width: 100%; }
            .menu-toggle { display: block; }
            .toolbar, .suggestion-bar, .status-bar { padding: 10px 15px; }
            #editor { padding: 15px; }
            .keyboard-toggle { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand"><div class="brand-logo">മ</div> Thooval</div>
        <button class="new-file-btn"><span>➕</span> New File</button>
        <div class="file-list">
            <div class="list-header">Today</div>
            <div class="file-item active"><span>📄</span> Draft_01.txt</div>
        </div>

        <div class="dictionary-section">
            <div class="dict-title">📖 Dictionary Search</div>
            <input type="text" id="dict-input" class="dict-input" placeholder="Type English word...">
            <div id="dict-results" class="dict-results"></div>
        </div>

        <div class="user-profile">
            <div class="avatar">U</div>
            <div class="user-details">
                <span class="user-name">Demo User</span>
                <span class="user-role">Workspace User</span>
            </div>
        </div>
    </aside>

    <main class="workspace">
        <div class="toolbar">
            <button class="menu-toggle" id="menu-toggle">☰</button>
            <button class="tool-btn" id="btn-undo" title="Undo">&#x21BA;</button>
            <button class="tool-btn" id="btn-redo" title="Redo">&#x21BB;</button>
            <div class="divider"></div>
            <select class="select-format" id="font-family-select">
                <option value="'Manjari', sans-serif">Manjari</option>
                <option value="'Chilanka', cursive">Chilanka</option>
                <option value="'Gayathri', sans-serif">Gayathri</option>
            </select>
            <select class="select-format" id="font-size-select">
                <option value="16">16px</option>
                <option value="18" selected>18px</option>
                <option value="22">22px</option>
            </select>
            <div class="divider"></div>
            <button class="tool-btn" id="btn-bold" title="Bold"><b>B</b></button>
            <button class="tool-btn" id="btn-italic" title="Italic"><i>I</i></button>
            <button class="tool-btn" id="btn-underline" title="Underline"><u>U</u></button>
            <div class="divider"></div>
            <div class="keyboard-toggle">
                <label><input type="radio" name="kbd" value="phonetic" checked> Phonetic</label>
                <label><input type="radio" name="kbd" value="inscript"> Inscript</label>
            </div>
        </div>

        <div class="suggestion-bar" id="suggestion-bar">
            <span class="suggestion-placeholder">Type in English (e.g., 'namaskaram')...</span>
        </div>

        <textarea id="editor" placeholder="ഇവിടെ മലയാളം എഴുതാം..."></textarea>

        <div class="status-bar">
            <div class="status-group">
                <div class="lang-toggle">
                    <button class="lang-btn active" id="btn-lang-ml">മലയാളം</button>
                    <button class="lang-btn" id="btn-lang-en">English</button>
                </div>
                <button class="action-btn" id="btn-voice">🎤 Voice</button>
            </div>
            <div class="status-group">
                <button class="action-btn" id="btn-copy-uni">📋 Unicode</button>
                <button class="action-btn btn-dtp" id="btn-copy-fml">📄 Generate FML-TT</button>
            </div>
        </div>

        <div class="modal-overlay" id="fml-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span>FML-TT Converted Text</span>
                    <button class="close-modal" id="close-modal">&times;</button>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">The text has been converted using your custom ML-TT Keyboard mapping.</p>
                <textarea id="fml-output-area"></textarea>
                <button class="modal-btn" id="modal-copy-btn">📋 Copy to Clipboard</button>
            </div>
        </div>
    </main>

    <script>
        $(document).ready(function() {
            const $editor = $('#editor');
            const $suggestionBar = $('#suggestion-bar');
            
            let currentLang = 'ml'; 
            let currentKeyboard = 'phonetic'; 
            let currentMatchStart = -1;
            let currentMatchEnd = -1;

            // --- DICTIONARY SEARCH API LOGIC ---
            let dictTimer;
            $('#dict-input').on('input', function() {
                let word = $(this).val().trim();
                if (word.length < 2) {
                    $('#dict-results').empty();
                    return;
                }
                
                clearTimeout(dictTimer);
                // Use a free translation endpoint for English to Malayalam
                dictTimer = setTimeout(() => {
                    let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ml&dt=t&q=${encodeURI(word)}`;
                    $.get(url, function(data) {
                        if (data && data[0] && data[0][0]) {
                            let translated = data[0][0][0];
                            $('#dict-results').html(`<div class="dict-item" title="Click to add to editor">${translated}</div>`);
                        }
                    });
                }, 500);
            });

            // Add clicked dictionary word to Editor
            $(document).on('click', '.dict-item', function() {
                let translatedWord = $(this).text();
                insertTextAtCursor(translatedWord + " ");
                $('#dict-input').val('');
                $('#dict-results').empty();
                $editor.focus();
            });

            // Mobile Sidebar
            $('#menu-toggle').on('click', function() { $('#sidebar').addClass('open'); $('#sidebar-overlay').addClass('open'); });
            $('#sidebar-overlay').on('click', function() { $('#sidebar').removeClass('open'); $('#sidebar-overlay').removeClass('open'); });

            // Language & Keyboard Toggles
            $('#btn-lang-en').on('click', function() {
                currentLang = 'en'; $('.lang-btn').removeClass('active'); $(this).addClass('active');
                clearSuggestions(); $suggestionBar.html('<span class="suggestion-placeholder">English mode active. Type normally.</span>'); $editor.focus();
            });

            $('#btn-lang-ml').on('click', function() {
                currentLang = 'ml'; $('.lang-btn').removeClass('active'); $(this).addClass('active');
                clearSuggestions(); $editor.focus();
            });

            $('input[name="kbd"]').on('change', function() {
                currentKeyboard = $(this).val(); clearSuggestions();
                $suggestionBar.html(currentKeyboard === 'inscript' ? '<span class="suggestion-placeholder">Inscript keyboard active.</span>' : '<span class="suggestion-placeholder">Type in English...</span>');
                $editor.focus();
            });

            // Undo/Redo History
            let textHistory = [""];
            let historyIndex = 0;
            function saveHistory() {
                let currentVal = $editor.val();
                if (currentVal !== textHistory[historyIndex]) {
                    textHistory = textHistory.slice(0, historyIndex + 1);
                    textHistory.push(currentVal);
                    historyIndex++;
                }
            }
            $('#btn-undo').on('click', function() { if (historyIndex > 0) { historyIndex--; $editor.val(textHistory[historyIndex]); } });
            $('#btn-redo').on('click', function() { if (historyIndex < textHistory.length - 1) { historyIndex++; $editor.val(textHistory[historyIndex]); } });

            // Formatting
            $('#font-family-select').on('change', function() { $editor.css('font-family', $(this).val()); });
            $('#font-size-select').on('change', function() { $editor.css('font-size', $(this).val() + 'px'); });
            $('#btn-bold').on('click', function() { $(this).toggleClass('active'); $editor.css('font-weight', $(this).hasClass('active') ? 'bold' : 'normal'); });
            $('#btn-italic').on('click', function() { $(this).toggleClass('active'); $editor.css('font-style', $(this).hasClass('active') ? 'italic' : 'normal'); });
            $('#btn-underline').on('click', function() { $(this).toggleClass('active'); $editor.css('text-decoration', $(this).hasClass('active') ? 'underline' : 'none'); });

            // Inscript Keyboard
            const inscriptMap = {
                'D':'അ', 'E':'ആ', 'F':'ഇ', 'R':'ഈ', 'G':'ഉ', 'T':'ഊ', '+':'ഋ', 'S':'എ', 'W':'ഏ', 'A':'ഒ', 'Q':'ഓ',
                'k':'ക', 'K':'ഖ', 'i':'ഗ', 'I':'ഘ', 'U':'ങ', ';':'ച', ':':'ഛ', 'p':'ജ', 'P':'ഝ', '}':'ഞ',
                "'":'ട', '"':'ഠ', '[':'ഡ', '{':'ഢ', 'C':'ണ', 'l':'ത', 'L':'ഥ', 'o':'ദ', 'O':'ധ', 'v':'ന',
                'h':'പ', 'H':'ഫ', 'y':'ബ', 'Y':'ഭ', 'c':'മ', '/':'യ', 'j':'ര', 'n':'ല', 'b':'വ', 'M':'ശ',
                '<':'ഷ', 'm':'സ', 'u':'ഹ', 'N':'ള', '>':'ഴ', 'J':'റ',
                'e':'ാ', 'f':'ി', 'r':'ീ', 'g':'ു', 't':'ൂ', '=':'ൃ', 's':'െ', 'w':'േ', 'a':'ൊ', 'q':'ോ', 'd':'്', 'X':'ം', '_':'ഃ'
            };
            $editor.on('keypress', function(e) {
                if (currentLang === 'ml' && currentKeyboard === 'inscript') {
                    let char = String.fromCharCode(e.which);
                    if (inscriptMap[char]) { e.preventDefault(); insertTextAtCursor(inscriptMap[char]); }
                }
            });

            function insertTextAtCursor(text) {
                let start = $editor[0].selectionStart; let end = $editor[0].selectionEnd; let val = $editor.val();
                $editor.val(val.substring(0, start) + text + val.substring(end));
                $editor[0].selectionStart = $editor[0].selectionEnd = start + text.length;
                saveHistory();
            }

            // Phonetic Dictionary (Google API)
            $editor.on('input', function() {
                if (currentLang === 'en' || currentKeyboard === 'inscript') return;
                let textBeforeCursor = $editor.val().substring(0, $editor[0].selectionStart);
                let match = textBeforeCursor.match(/([a-zA-Z]+)$/);
                if (match) {
                    currentMatchStart = match.index; currentMatchEnd = $editor[0].selectionStart;
                    fetchSuggestions(match[1]);
                } else { clearSuggestions(); }
            });

            let typingTimer;
            $editor.on('keyup', function() { clearTimeout(typingTimer); typingTimer = setTimeout(saveHistory, 1000); });
            $editor.on('keydown', function(e) {
                if (currentLang === 'en' || currentKeyboard === 'inscript') return;
                let $active = $('.suggestion-item.active');
                if ($('.suggestion-item').length > 0) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault(); if ($active.length) $active.click(); 
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault(); let $next = $active.next('.suggestion-item');
                        if ($next.length) { $active.removeClass('active'); $next.addClass('active'); }
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault(); let $prev = $active.prev('.suggestion-item');
                        if ($prev.length) { $active.removeClass('active'); $prev.addClass('active'); }
                    }
                }
            });

            function fetchSuggestions(word) {
                $.get(`https://inputtools.google.com/request?text=${word}&itc=ml-t-i0-und&num=5&cp=0&cs=1&ie=utf-8&oe=utf-8`, function(res) {
                    if (res[0] === 'SUCCESS') renderSuggestions(res[1][0][1]);
                });
            }

            function renderSuggestions(words) {
                $suggestionBar.empty();
                words.forEach((word, index) => {
                    let activeClass = index === 0 ? 'active' : '';
                    let $badge = $(`<span class="suggestion-item ${activeClass}">${word}</span>`);
                    $badge.on('click', function() { replaceWord(word); });
                    $suggestionBar.append($badge);
                });
            }

            function replaceWord(malayalamWord) {
                let text = $editor.val();
                $editor.val(text.substring(0, currentMatchStart) + malayalamWord + " " + text.substring(currentMatchEnd));
                let newPos = currentMatchStart + malayalamWord.length + 1;
                $editor[0].setSelectionRange(newPos, newPos);
                clearSuggestions(); saveHistory(); $editor.focus();
            }

            function clearSuggestions() {
                if(currentLang === 'en' || currentKeyboard === 'inscript') return;
                $suggestionBar.html('<span class="suggestion-placeholder">Type in English (e.g., \'namaskaram\')...</span>');
            }

            // --- LIVE VOICE TYPING (Web Speech API) ---
            let recognition;
            let isRecording = false;

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRec();
                recognition.continuous = true;
                recognition.interimResults = true; 

                recognition.onstart = function() {
                    isRecording = true;
                    $('#btn-voice').addClass('recording').html('⏹ Listening...');
                };

                recognition.onresult = function(event) {
                    let finalTranscript = '';
                    let interimTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }
                    
                    if (finalTranscript !== '') {
                        insertTextAtCursor(finalTranscript + " ");
                    }
                    
                    if (interimTranscript !== '') {
                        $suggestionBar.html(`<span style="color:var(--accent-color); font-weight:bold;">Hearing: ${interimTranscript}...</span>`);
                    } else {
                        clearSuggestions();
                    }
                };

                recognition.onerror = function(event) {
                    if (event.error === 'not-allowed') {
                        alert("Microphone access blocked. Run this via Local Server or GitHub Pages.");
                    }
                    $('#btn-voice').removeClass('recording').html('🎤 Voice');
                    isRecording = false;
                };

                recognition.onend = function() {
                    $('#btn-voice').removeClass('recording').html('🎤 Voice');
                    isRecording = false;
                };
            }

            $('#btn-voice').on('click', function() {
                if (!recognition) return alert("Voice typing is not supported in this browser. Please use Google Chrome.");
                
                if (isRecording) {
                    recognition.stop();
                } else {
                    recognition.lang = currentLang === 'ml' ? 'ml-IN' : 'en-US';
                    recognition.start();
                }
            });

            // --- MASTER FML-TT DICTIONARY ENGINE ---
            $('#btn-copy-fml').on('click', function() {
                let text = $editor.val();
                
                text = text.replace(/\u0D4A/g, "\u0D46\u0D3E"); 
                text = text.replace(/\u0D4B/g, "\u0D47\u0D3E"); 
                text = text.replace(/\u0D4C/g, "\u0D46\u0D57"); 

                const consGroup = "([ക-ഹളഴറൺ-ൿ](?:്[ക-ഹളഴറൺ-ൿ])*)"; 
                const leftVowels = "([\u0D46\u0D47\u0D48])"; 
                text = text.replace(new RegExp(consGroup + leftVowels, "g"), "$2$1");

                text = text.replace(/ണ്\u200D/g, "Æ").replace(/ന്\u200D/g, "³").replace(/ര്\u200D/g, "À").replace(/ല്\u200D/g, "Â").replace(/ള്\u200D/g, "Ä");
                text = text.replace(/[\u200C\u200D]/g, '');

                const conjuncts = {
                    'ക്ക': '¡', 'ക്ല': '¢', 'ക്ഷ': '£', 'ഗ്ഗ': '¤', 'ഗ്ന': '¥',
                    'ങ്ങ': '§', 'ച്ച': '¨', 'ജ്ജ': '©', 'ഞ്ഞ': 'ª', 'ട്ട': '«',
                    'ണ്ണ': '¬', 'ത്ത': '¯', 'ന്ന': '¶', 'ന്മ': '±', 'പ്പ': '¸',
                    'ബ്ബ': '³', 'ഭ്ഭ': '´', 'മ്മ': '½', 'യ്യ': '¿', 'ല്ല': 'Ã',
                    'വ്വ': 'Æ', 'ശ്ശ': 'È', 'സ്സ': 'Ê', 'ള്ള': 'Å', 'റ്റ': 'ä',
                    'ങ്ക': '¦', 'ഞ്ച': '©', 'ണ്ട': 'ï', 'ന്ത': '´', 'മ്പ': '¼',
                    'ക്യ': 'Iy', 'ക്ര': '{I', 'ക്വ': 'Iz', 'ച്ഛ': 'b', 'ജ്ഞ': 'P',
                    'ഡ്ഡ': '«', 'ദ്ധ': '²', 'സ്ഥ': 'Ø', 'സ്ക': 'kv', 'സ്ത': 'kvX',
                    'സ്ന': 'kv\\', 'സ്പ': 'kv]', 'സ്മ': 'kvv', 'സ്വ': 'kzt',
                    'ശ്ര': '{i', 'സ്ര': '{k', 'ത്ര': '{X', 'പ്യ': ']y', 'പ്വ': ']z', 
                    'പ്ല': ']v', 'പ്ര': '{]', 'ർഗ': 'ÀK', 'ന്റ': 'â', 'ൻ്റ': 'â', 
                    '്യ': 'y', '്ര': '{', '്വ': 'z'
                };
                
                for (let [ml, ascii] of Object.entries(conjuncts)) {
                    text = text.split(ml).join(ascii);
                }

                const fmlMap = {
                    'അ': 'A', 'ആ': 'B', 'ഇ': 'C', 'ഈ': 'Cu', 'ഉ': 'D', 
                    'ഊ': 'Du', 'ഋ': 'E', 'എ': 'F', 'ഏ': 'G', 'ഐ': 'sF', 
                    'ഒ': 'H', 'ഓ': 'Hm', 'ഔ': 'Hu', 
                    
                    'ക': 'I', 'ഖ': 'J', 'ഗ': 'K', 'ഘ': 'L', 'ങ': 'M',
                    'ച': 'N', 'ഛ': 'O', 'ജ': 'P', 'ഝ': 'Q', 'ഞ': 'R',
                    'ട': 'S', 'ഠ': 'T', 'ഡ': 'U', 'ഢ': 'V', 'ണ': 'W',
                    'ത': 'X', 'ഥ': 'Y', 'ദ': 'Z', 'ധ': '[', 'ന': '\\',
                    'പ': ']', 'ഫ': '^', 'ബ': '_', 'ഭ': '`', 'മ': 'a',
                    'യ': 'b', 'ര': 'c', 'റ': 'd', 'ല': 'e', 'ള': 'f', 
                    'ഴ': 'g', 'വ': 'h', 'ശ': 'i', 'ഷ': 'j', 'സ': 'k', 'ഹ': 'l',
                    
                    '\u0D46': 's', // െ
                    '\u0D47': 't', // േ
                    '\u0D48': 'ss', // ൈ
                    
                    '\u0D3F': 'n', // ി
                    '\u0D40': 'o', // ീ
                    '\u0D41': 'p', // ു
                    '\u0D42': 'q', // ൂ
                    '\u0D43': 'r', // ൃ
                    '\u0D3E': 'm', // ാ
                    '\u0D57': 'u', // ൗ 
                    
                    '\u0D4D': 'v', // ് (Virama)
                    '\u0D02': 'w', // ം (Anusvaram)
                    '\u0D03': 'x', // ഃ (Visargam)
                    
                    'ർ': 'À', 'ൽ': 'Â', 'ൾ': 'Ä', 'ൺ': '¬', 'ൻ': '³'
                };

                let fmlOutput = "";
                for (let i = 0; i < text.length; i++) {
                    let char = text[i];
                    fmlOutput += (char.length === 1 && fmlMap[char]) ? fmlMap[char] : char;
                }

                $('#fml-output-area').val(fmlOutput);
                $('#fml-modal').fadeIn(200).css("display", "flex");
            });

            $('#modal-copy-btn').on('click', function() {
                navigator.clipboard.writeText($('#fml-output-area').val());
                $(this).text('✅ Copied to Clipboard!');
                setTimeout(() => $(this).text('📋 Copy to Clipboard'), 2000);
            });

            $('#close-modal').on('click', function() { $('#fml-modal').fadeOut(200); });

            $('#btn-copy-uni').on('click', function() {
                navigator.clipboard.writeText($editor.val());
                let $btn = $(this);
                $btn.html('✅ Copied!');
                setTimeout(() => $btn.html('📋 Unicode'), 2000);
            });
        });
    </script>
</body>
</html>
